services:
  postgres:
    image: postgres:16-alpine
    container_name: docenmarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docenmarket
      POSTGRES_PASSWORD: docenmarket
      POSTGRES_DB: docenmarket
    ports:
      - "5432:5432"
    volumes:
      - docenmarket_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docenmarket -d docenmarket"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  docenmarket_pgdata:
